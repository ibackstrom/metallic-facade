<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metallic Facade (2D)</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #dddcd7;
  }
  .stage {
    width: min(80vw, 520px);
    aspect-ratio: 498 / 1050;
    overflow: hidden;
    cursor: crosshair;
  }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <script type="module">
    import MetallicFacade from './metallic-facade.js';
    new MetallicFacade(document.getElementById('stage'), {
      image: 'facade.svg',
      metallic: 0.9,
      ambientLight: 0.55,
      lightRadius: 1.4,
      specular: 1.2,
      normalStrength: 2.5,
    });
  </script>
</body>
</html>
