<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metallic Facade (2D)</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #e7e6e2;
  }
  .stage {
    width: min(90vw, 680px);
    aspect-ratio: 1 / 1;
    overflow: hidden;
    cursor: crosshair;
  }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <!--
    Textures: "Stone Tiles" from Poly Haven — CC0 (public domain).
    color = *_ao, normal = *_nor_gl, roughness = *_rough, displacement = *_disp.
    https://polyhaven.com/a/stone_tiles
  -->
  <script type="module">
    import MetallicFacade from './metallic-facade.js';
    new MetallicFacade(document.getElementById('stage'), {
      image: 'relief.png',
      normalMap: 'relief-normal.png',
      roughnessMap: 'relief-rough.png',
      dispMap: 'relief-disp.png',
      metallic: 0.95,
      ambientLight: 0.5,
      lightRadius: 0.8,
      specular: 1.3,
    });
  </script>
</body>
</html>
