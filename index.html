<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metallic Facade (2D)</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #e7e6e2;
  }
  .stage {
    width: min(86vw, 560px);
    aspect-ratio: 2523 / 3687;
    overflow: hidden;
    cursor: crosshair;
  }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <!--
    Base image: "The Great Eleusinian Relief" (Roman copy of a Greek original),
    The Metropolitan Museum of Art — Public Domain (CC0). Free for commercial use.
    https://www.metmuseum.org/art/collection/search/248899
    Normal map generated with scripts/gen-normal.py.
  -->
  <script type="module">
    import MetallicFacade from './metallic-facade.js';
    new MetallicFacade(document.getElementById('stage'), {
      image: 'relief.png',
      normalMap: 'relief-normal.png',
      metallic: 0.95,
      ambientLight: 0.5,
      lightRadius: 1.7,
      specular: 1.3,
    });
  </script>
</body>
</html>
