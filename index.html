<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metallic Facade (2D)</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #8f9094;
  }
  .stage {
    width: min(86vw, 600px);
    aspect-ratio: 2978 / 3722;
    overflow: hidden;
    cursor: crosshair;
  }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <script type="module">
    import MetallicFacade from './metallic-facade.js';
    new MetallicFacade(document.getElementById('stage'), {
      image: 'relief.jpg',
      metallic: 0.95,
      ambientLight: 0.5,
      lightRadius: 1.3,
      specular: 1.3,
      normalStrength: 3.0,
    });
  </script>
</body>
</html>
