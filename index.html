<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metallic Facade (2D)</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #e7e6e2;
  }
  .stage {
    width: min(90vw, 720px);
    aspect-ratio: 1 / 1;
    overflow: hidden;
    cursor: crosshair;
  }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <script type="module">
    import MetallicFacade from './metallic-facade.js';
    new MetallicFacade(document.getElementById('stage'), {
      image: 'relief.png',
      normalMap: 'relief-normal.png',
      metallic: 0.95,
      ambientLight: 0.5,
      lightRadius: 1.6,
      specular: 1.3,
    });
  </script>
</body>
</html>
