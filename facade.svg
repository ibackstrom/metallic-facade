<svg xmlns="http://www.w3.org/2000/svg" width="498" height="1050" viewBox="0 0 498 1050">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9d6cf"/>
      <stop offset="1" stop-color="#c4c0b6"/>
    </linearGradient>
    <linearGradient id="col" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f8a7e"/>
      <stop offset="0.5" stop-color="#cfcabd"/>
      <stop offset="1" stop-color="#8f8a7e"/>
    </linearGradient>
  </defs>

  <rect width="498" height="1050" fill="url(#bg)"/>

  <!-- pediment -->
  <polygon points="249,40 470,180 28,180" fill="#b8b3a6"/>
  <polygon points="249,70 440,185 58,185" fill="#a39e90"/>

  <!-- entablature -->
  <rect x="40" y="185" width="418" height="55" fill="#b0a99b"/>
  <rect x="40" y="240" width="418" height="14" fill="#928c7d"/>

  <!-- columns -->
  <g fill="url(#col)">
    <rect x="70"  y="260" width="56" height="640" rx="6"/>
    <rect x="160" y="260" width="56" height="640" rx="6"/>
    <rect x="282" y="260" width="56" height="640" rx="6"/>
    <rect x="372" y="260" width="56" height="640" rx="6"/>
  </g>
  <!-- column flutes -->
  <g stroke="#7d786c" stroke-width="2" opacity="0.5">
    <line x1="84"  y1="270" x2="84"  y2="892"/><line x1="98" y1="270" x2="98" y2="892"/><line x1="112" y1="270" x2="112" y2="892"/>
    <line x1="174" y1="270" x2="174" y2="892"/><line x1="188" y1="270" x2="188" y2="892"/><line x1="202" y1="270" x2="202" y2="892"/>
    <line x1="296" y1="270" x2="296" y2="892"/><line x1="310" y1="270" x2="310" y2="892"/><line x1="324" y1="270" x2="324" y2="892"/>
    <line x1="386" y1="270" x2="386" y2="892"/><line x1="400" y1="270" x2="400" y2="892"/><line x1="414" y1="270" x2="414" y2="892"/>
  </g>
  <!-- capitals -->
  <g fill="#bdb8aa">
    <rect x="60"  y="252" width="76" height="16" rx="3"/>
    <rect x="150" y="252" width="76" height="16" rx="3"/>
    <rect x="272" y="252" width="76" height="16" rx="3"/>
    <rect x="362" y="252" width="76" height="16" rx="3"/>
  </g>

  <!-- steps / stylobate -->
  <rect x="30" y="900"  width="438" height="30" fill="#aaa597"/>
  <rect x="16" y="930"  width="466" height="34" fill="#9b9688"/>
  <rect x="0"  y="964"  width="498" height="86" fill="#8c8779"/>
</svg>
