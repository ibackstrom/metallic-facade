<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metallic Statue — 3D hover effect</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #0c0d10; font-family: system-ui, sans-serif; color: #cfd2d8;
  }
  .stage {
    position: relative;
    width: min(92vw, 560px);
    height: min(80vh, 720px);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,.5);
    cursor: grab;
  }
  .stage:active { cursor: grabbing; }
  .stage::after {
    content: 'loading 3D model…';
    position: absolute; inset: 0; display: grid; place-items: center;
    color: #777; font-size: 14px; pointer-events: none;
    transition: opacity .4s ease;
  }
  .stage.loaded::after { opacity: 0; }
  .hint { position: fixed; top: 18px; left: 0; right: 0; text-align: center;
          color: #888; font-size: 14px; }
  .credit { position: fixed; bottom: 12px; left: 0; right: 0; text-align: center;
            color: #555; font-size: 11px; }
  .credit a { color: #777; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <div class="hint">Hover to turn it chrome · drag to rotate · scroll to zoom</div>
  <div class="stage" id="stage"></div>
  <div class="credit">
    Model: “Ibex Statue Scan - Berlin - Tierpark” by
    <a href="https://sketchfab.com/art-3d.com">Christian Rambow</a>,
    licensed <a href="http://creativecommons.org/licenses/by-nc/4.0/">CC-BY-NC-4.0</a>.
  </div>

  <script type="module">
    import MetallicStatue from './statue.js';

    new MetallicStatue(document.getElementById('stage'), {
      model: 'model/scene.gltf',
      chromeRoughness: 0.05,
      autoRotateSpeed: 0.35,
    });
  </script>
</body>
</html>
